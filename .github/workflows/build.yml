name: Build Switch NRO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Switch Tools and Libs
        run: |
          # This ensures we have both the libraries AND the conversion tools
          dkp-pacman -Syu --noconfirm switch-dev switch-tools

      - name: Build App
        run: |
          # Add all devkitPro tool folders to the PATH
          export DEVKITPRO=/opt/devkitpro
          export PATH=$PATH:$DEVKITPRO/devkitA64/bin:$DEVKITPRO/tools/bin
          make
          
      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: SwitchApp
          path: "*.nro"