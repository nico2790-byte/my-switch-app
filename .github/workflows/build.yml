name: Build Switch NRO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build App
        run: |
          # Use the built-in devkitPro toolchain
          make

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: SwitchApp
          path: "*.nro"